services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REPO: https://github.com/harryfrzz/neo.git
        BRANCH: main
    container_name: neo-backend
    volumes:
      - backend_data:/app/backend/data
      - whisper_cache:/root/.cache/whisper
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO: https://github.com/harryfrzz/neo.git
        BRANCH: main
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: neo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  whisper_cache:
